              icon: <CheckCircle size={20} />,
              title: "階段 10 | 缺失管理、正式驗收與移交",
              goal: "把缺失清單清零，文件交齊，才算真正交付。透過缺失單、責任人與期限管理，完成複驗、教育訓練與正式簽認，避免帶病移交。",
              keyPoints: [
                "建立缺失清單並指定責任單位、期限與補證要求。",
                "缺失未清零前，不視為驗收完成。",
                "完成教育訓練、文件交底與正式移交。"
              ],
              flow: [
                { type: "step", text: "彙整驗收結果" },
                { type: "step", text: "建立缺失清單" },
                { type: "step", text: "指派責任單位與期限" },
                { type: "decision", text: "缺失是否清零?", yes: "文件交齊", no: "改善完成並補證據 → 複驗" },
                { type: "step", text: "教育訓練/操作交底" },
                { type: "step", text: "正式驗收簽認" },
                { type: "step", text: "正式移交", highlight: true }
              ]
            },
            {
              id: 11,
              icon: <ShieldCheck size={20} />,
              title: "階段 11 | 試運轉、保固、售後閉環與結案",
              goal: "不是簽完字就結束，而是要把異常、保固與經驗回寫做完。在試運轉與保固期內持續監控異常、處理RCA、啟動售後支援，最後完成專案複盤與知識沉澱。",
              keyPoints: [
                "正式移交後進入試運轉與觀察期，持續追蹤告警與穩定度。",
                "發生異常由 ASM 主責協調 RCA、改善、再驗證。",
                "結案時要做成本/時程/風險/缺失回顧，更新SOP 與知識庫。"
              ],
              flow: [
                { type: "step", text: "正式移交後" },
                { type: "step", text: "試運轉/觀察期" },
                { type: "step", text: "異常監控/告警追蹤" },
                { type: "decision", text: "是否有重大缺失?", yes: "ASM 主責協調 RCA/改善/再驗證", no: "保固期起算" },
                { type: "step", text: "售後 SOP/RMA/維護窗口啟動" },
                { type: "step", text: "專案結案會議" },
                { type: "step", text: "成本/風險/時程/缺失回顧" },
                { type: "step", text: "文件歸檔/模板更新/知識庫沉澱", highlight: true }
              ]
            }
          ]
        };

        // --- 元件區 ---
        const FlowChart = ({ flowData }) => {
          return (
            <div className="flex flex-col items-center py-8 w-full max-w-2xl mx-auto space-y-2">
              {flowData.map((node, index) => {
                const isLast = index === flowData.length - 1;
                
                if (node.type === 'step') {
                  return (
                    <React.Fragment key={index}>
                      <div className={`w-full md:w-3/4 p-4 rounded-xl border text-center shadow-sm relative z-10 transition-transform hover:scale-[1.02] ${
                        node.highlight ? 'bg-blue-600 text-white border-blue-700 shadow-md font-bold' : 'bg-white border-slate-200 text-slate-800'
                      }`}>
                        {node.text.split('\n').map((line, i) => (
                          <div key={i} className={i > 0 ? "text-sm mt-1 opacity-90" : ""}>{line}</div>
                        ))}
                      </div>
                      {!isLast && <ArrowDown className="text-slate-400 my-2" size={24} />}
                    </React.Fragment>
                  );
                }

                if (node.type === 'decision') {
                  return (
                    <React.Fragment key={index}>
                      <div className="w-full relative py-2">
                        <div className="mx-auto w-3/4 md:w-1/2 p-4 bg-amber-50 border-2 border-amber-300 rounded-lg text-center shadow-sm relative z-10">
                          <span className="text-amber-800 font-bold flex items-center justify-center gap-2">
                            <AlertTriangle size={18} />
                            {node.text}
                          </span>
                        </div>
                        
                        {/* 決策分支 UI */}
                        <div className="flex w-full justify-between mt-6 px-2 md:px-12 relative">
                          <div className="absolute top-[-24px] left-1/4 w-1/2 h-[24px] border-l-2 border-r-2 border-t-2 border-slate-300 rounded-t-xl z-0" style={{ transform: 'translateY(12px)' }}></div>
                          
                          <div className="flex flex-col items-center w-[48%] relative z-10">
                            <span className="px-2 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full mb-3 border border-green-200">是 (YES)</span>
                            <div className="w-full p-3 bg-green-50 border border-green-200 rounded-lg text-center text-sm shadow-sm text-green-900">
                              {node.yes}
                            </div>
                          </div>
                          
                          <div className="flex flex-col items-center w-[48%] relative z-10">
                            <span className="px-2 py-1 bg-red-100 text-red-700 text-xs font-bold rounded-full mb-3 border border-red-200">否 (NO)</span>
                            <div className="w-full p-3 bg-red-50 border border-red-200 rounded-lg text-center text-sm shadow-sm text-red-900">
                              {node.no}
                            </div>
                          </div>
                        </div>
                      </div>
                      {!isLast && <div className="h-6"></div>}
                    </React.Fragment>
                  );
                }
                return null;
              })}
            </div>
          );
        };

        function App() {
          const [activeTab, setActiveTab] = useState(0); 
          const [isSidebarOpen, setIsSidebarOpen] = useState(false);

          const toggleSidebar = () => setIsSidebarOpen(!isSidebarOpen);
          const handleTabClick = (id) => {
            setActiveTab(id);
            setIsSidebarOpen(false);
          };

          const activeStage = activeTab > 0 ? projectData.stages.find(s => s.id === activeTab) : null;

          return (
            <div className="min-h-screen bg-slate-50 flex font-sans text-slate-800">
              
              {/* 側邊導覽列 */}
              <aside className={`fixed inset-y-0 left-0 z-50 w-72 bg-slate-900 text-slate-300 transform transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:inset-auto ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                <div className="flex items-center justify-between p-4 border-b border-slate-700">
                  <div className="font-bold text-lg text-white flex items-center gap-2">
                    <Zap className="text-blue-400" />
                    專案流程系統
                  </div>
                  <button className="lg:hidden text-slate-300 hover:text-white" onClick={toggleSidebar}>
                    <X size={24} />
                  </button>
                </div>
                
                <div className="p-4 overflow-y-auto h-[calc(100vh-70px)] custom-scrollbar">
                  <ul className="space-y-1">
                    <li>
                      <button 
                        onClick={() => handleTabClick(0)}
                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors ${activeTab === 0 ? 'bg-blue-600 text-white shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}
                      >
                        <Home size={20} />
                        <span className="font-medium">首頁 - 專案總覽</span>
                      </button>
                    </li>
                    
                    <li className="pt-4 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">
                      專案階段 (1 - 11)
                    </li>

                    {projectData.stages.map((stage) => (
                      <li key={stage.id}>
                        <button 
                          onClick={() => handleTabClick(stage.id)}
                          className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-left transition-colors ${activeTab === stage.id ? 'bg-blue-600 text-white shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}
                        >
                          <span className={`${activeTab === stage.id ? 'text-white' : 'text-blue-400'}`}>{stage.icon}</span>
                          <span className="text-sm font-medium line-clamp-1">{stage.title}</span>
                        </button>
                      </li>
                    ))}
                  </ul>
                </div>
              </aside>

              {/* 遮罩層 */}
              {isSidebarOpen && (
                <div className="fixed inset-0 bg-slate-900/50 z-40 lg:hidden backdrop-blur-sm" onClick={toggleSidebar}></div>
              )}

              {/* 主要內容區 */}
              <main className="flex-1 flex flex-col h-screen overflow-hidden">
                <header className="bg-white border-b border-slate-200 px-4 py-3 flex items-center gap-4 lg:hidden sticky top-0 z-30">
                  <button onClick={toggleSidebar} className="text-slate-500 hover:text-slate-800 bg-slate-100 p-2 rounded-md">
                    <Menu size={24} />
                  </button>
                  <div className="font-bold text-slate-800 truncate">
                    {activeTab === 0 ? "首頁 - 專案總覽" : activeStage?.title}
                  </div>
                </header>

                <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar relative">
                  
                  {activeTab === 0 && (
                    <div className="max-w-5xl mx-auto space-y-8 animate-in fade-in duration-500">
                      <div className="bg-gradient-to-r from-blue-700 to-indigo-800 rounded-2xl p-8 md:p-12 text-white shadow-xl">
                        <h1 className="text-3xl md:text-4xl font-extrabold mb-4">{projectData.overview.title}</h1>
                        <p className="text-blue-100 text-lg md:text-xl font-medium max-w-3xl leading-relaxed">{projectData.overview.subtitle}</p>
                        <div className="mt-6 inline-flex items-center bg-white/20 backdrop-blur-md px-4 py-1.5 rounded-full text-sm font-medium">
                          製作日期：{projectData.overview.date}
                        </div>
                      </div>

                      <div className="grid md:grid-cols-2 gap-6">
                        <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
                          <h2 className="text-xl font-bold flex items-center gap-2 mb-4 text-slate-800">
                            <MapIcon className="text-blue-600" />
                            文件定位
                          </h2>
                          <ul className="space-y-3 text-slate-600">
                            {projectData.overview.positioning.map((item, i) => (
                              <li key={i} className="flex items-start gap-3">
                                <CheckCircle size={18} className="text-green-500 shrink-0 mt-0.5" />
                                <span className="leading-relaxed">{item}</span>
                              </li>
                            ))}
                          </ul>
                        </div>

                        <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
                          <h2 className="text-xl font-bold flex items-center gap-2 mb-4 text-slate-800">
                            <Play className="text-blue-600" />
                            這份版本強調的 3 件事
                          </h2>
                          <ul className="space-y-3 text-slate-600">
                            {projectData.overview.highlights.map((item, i) => (
                              <li key={i} className="flex items-start gap-3">
                                <CheckCircle size={18} className="text-amber-500 shrink-0 mt-0.5" />
                                <span className="leading-relaxed">{item}</span>
                              </li>
                            ))}
                          </ul>
                        </div>
                      </div>

                      <div className="bg-slate-900 rounded-xl p-8 text-white shadow-lg overflow-hidden relative">
                        <div className="absolute -right-10 -top-10 opacity-10">
                          <ShieldCheck size={200} />
                        </div>
                        <div className="relative z-10 grid md:grid-cols-2 gap-8">
                          <div>
                            <h2 className="text-2xl font-bold mb-6 text-blue-300">設計原則</h2>
                            <ul className="space-y-4 text-slate-300">
                              {projectData.overview.principles.map((item, i) => (
                                <li key={i} className="flex items-start gap-3 bg-slate-800/50 p-3 rounded-lg border border-slate-700">
                                  <Zap size={18} className="text-blue-400 shrink-0 mt-1" />
                                  <span>{item}</span>
                                </li>
                              ))}
                            </ul>
                          </div>
                          <div>
                            <h2 className="text-2xl font-bold mb-6 text-amber-300">5 個關鍵 Gate (節點門檻)</h2>
                            <div className="space-y-3">
                              {projectData.overview.gates.map((gate, i) => (
                                <div key={i} className="bg-slate-800 p-4 rounded-lg border-l-4 border-amber-400 flex flex-col">
                                  <span className="font-bold text-white mb-1">{gate.name}</span>
                                  <span className="text-sm text-slate-400">{gate.desc}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      </div>
                      
                      <div className="text-center py-8">
                        <button 
                          onClick={() => handleTabClick(1)}
                          className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all hover:scale-105 active:scale-95 flex items-center gap-2 mx-auto"
                        >
                          開始瀏覽專案流程 <ArrowDown size={20} />
                        </button>
                      </div>
                    </div>
                  )}

                  {activeTab > 0 && activeStage && (
                    <div className="max-w-4xl mx-auto pb-20 animate-in fade-in duration-300">
                      <div className="bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-slate-200 mb-8 border-t-4 border-t-blue-600">
                        <div className="flex items-center gap-4 text-blue-600 mb-4">
                          <div className="p-3 bg-blue-50 rounded-xl">
                            {activeStage.icon}
                          </div>
                          <h1 className="text-2xl md:text-3xl font-bold text-slate-800">{activeStage.title}</h1>
                        </div>
                        
                        <div className="bg-slate-50 p-5 rounded-xl border border-slate-100 mb-6">
                          <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">階段目標</h3>
                          <p className="text-slate-700 leading-relaxed font-medium">{activeStage.goal}</p>
                        </div>

                        <div>
                          <h3 className="text-sm font-bold text-slate-500 uppercase tracking-wider mb-3">本階段必做重點</h3>
                          <ul className="grid md:grid-cols-1 gap-3">
                            {activeStage.keyPoints.map((point, i) => (
                              <li key={i} className="flex items-start gap-3 p-3 bg-white border border-slate-200 rounded-lg shadow-sm">
                                <CheckCircle size={20} className="text-blue-500 shrink-0" />
                                <span className="text-slate-700">{point}</span>
                              </li>
                            ))}
                          </ul>
                        </div>
                      </div>

                      <div className="bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-slate-200">
                        <h2 className="text-xl font-bold text-slate-800 mb-8 text-center pb-4 border-b border-slate-100">
                          標準作業流程圖
                        </h2>
                        
                        <div className="bg-slate-50 rounded-xl p-4 md:p-8 border border-slate-200">
                          <FlowChart flowData={activeStage.flow} />
                        </div>
                      </div>

                      <div className="flex justify-between items-center mt-8">
                        <button 
                          onClick={() => handleTabClick(activeTab - 1)}
                          disabled={activeTab === 1}
                          className={`px-6 py-2.5 rounded-lg font-medium transition-colors ${activeTab === 1 ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 shadow-sm'}`}
                        >
                          上一階段
                        </button>
                        <button 
                          onClick={() => handleTabClick(activeTab + 1)}
                          disabled={activeTab === projectData.stages.length}
                          className={`px-6 py-2.5 rounded-lg font-medium transition-colors ${activeTab === projectData.stages.length ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-700 shadow-sm'}`}
                        >
                          下一階段
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </main>
            </div>
          );
        }

        // --- 渲染應用程式 ---
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
